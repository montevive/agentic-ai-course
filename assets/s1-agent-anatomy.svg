<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 430" role="img">
  <title>Anatomy of an agent: perception feeds a reasoning LLM coupled to memory; tools act on the world inside an execution environment</title>
  <style>
    text { font-family: system-ui, -apple-system, "Segoe UI", sans-serif; fill: #0b0b0b; }
    .h { font-size: 15px; font-weight: 700; letter-spacing: 1px; fill: #52514e; }
    .t { font-size: 13.5px; font-weight: 600; }
    .s { font-size: 12px; fill: #52514e; }
    .env { font-size: 13px; font-weight: 600; fill: #52514e; letter-spacing: 0.5px; }
    .cap { font-size: 13px; fill: #52514e; font-style: italic; }
  </style>
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#52514e"/>
    </marker>
    <marker id="arrb" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#64748b"/>
    </marker>
  </defs>
  <rect width="920" height="430" fill="#fcfcfb"/>

  <!-- agent container -->
  <rect x="150" y="56" width="620" height="312" rx="12" fill="#ffffff" stroke="#52514e" stroke-width="1.5"/>
  <text x="170" y="84" class="h">AGENT</text>

  <!-- reasoning -->
  <rect x="190" y="104" width="180" height="92" rx="8" fill="#e6eff7" stroke="#0056a7"/>
  <text x="280" y="134" text-anchor="middle" class="t">REASONING</text>
  <text x="280" y="154" text-anchor="middle" class="s">the LLM</text>
  <text x="280" y="172" text-anchor="middle" class="s">decides the next step</text>

  <!-- memory -->
  <rect x="540" y="104" width="180" height="92" rx="8" fill="#fdf3dc" stroke="#eda100"/>
  <text x="630" y="128" text-anchor="middle" class="t">MEMORY</text>
  <text x="630" y="148" text-anchor="middle" class="s">short term: messages</text>
  <text x="630" y="166" text-anchor="middle" class="s">long term: RAG,</text>
  <text x="630" y="182" text-anchor="middle" class="s">memory layers (S2)</text>

  <!-- reasoning <-> memory -->
  <line x1="378" y1="150" x2="532" y2="150" stroke="#52514e" stroke-width="1.5" marker-start="url(#arr)" marker-end="url(#arr)"/>

  <!-- execution environment -->
  <rect x="176" y="238" width="568" height="118" rx="10" fill="none" stroke="#898781" stroke-dasharray="6 4"/>
  <text x="400" y="280" class="env">EXECUTION ENVIRONMENT</text>
  <text x="400" y="300" class="s">here: this notebook's Python process</text>
  <text x="400" y="318" class="s">production: sandbox, permissions and limits (S3)</text>

  <!-- tools -->
  <rect x="190" y="252" width="180" height="76" rx="8" fill="#e3f6ee" stroke="#1baf7a"/>
  <text x="280" y="284" text-anchor="middle" class="t">TOOLS</text>
  <text x="280" y="304" text-anchor="middle" class="s">act on the world</text>

  <!-- reasoning <-> tools -->
  <line x1="280" y1="204" x2="280" y2="244" stroke="#52514e" stroke-width="1.5" marker-start="url(#arr)" marker-end="url(#arr)"/>

  <!-- perception (in) -->
  <text x="78" y="144" text-anchor="middle" class="t">perception</text>
  <text x="78" y="164" text-anchor="middle" class="s">input, context,</text>
  <text x="78" y="180" text-anchor="middle" class="s">tool results</text>
  <line x1="26" y1="204" x2="144" y2="204" stroke="#64748b" stroke-width="1.8" marker-end="url(#arrb)"/>

  <!-- action (out) -->
  <text x="846" y="144" text-anchor="middle" class="t">action</text>
  <text x="846" y="164" text-anchor="middle" class="s">tool calls, APIs,</text>
  <text x="846" y="180" text-anchor="middle" class="s">side effects</text>
  <line x1="776" y1="204" x2="894" y2="204" stroke="#64748b" stroke-width="1.8" marker-end="url(#arrb)"/>

  <text x="460" y="398" text-anchor="middle" class="cap">Perception fills the context, reasoning decides, tools act, memory persists.</text>
  <text x="460" y="416" text-anchor="middle" class="cap">Everything meets in one finite, paid context window (Session 2).</text>
</svg>
