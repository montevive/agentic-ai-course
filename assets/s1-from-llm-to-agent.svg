<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 350" role="img">
  <title>From a single LLM call to the agent loop: single call, chain-of-thought, ReAct</title>
  <style>
    text { font-family: system-ui, -apple-system, "Segoe UI", sans-serif; fill: #0b0b0b; }
    .h { font-size: 15px; font-weight: 700; }
    .t { font-size: 13.5px; font-weight: 600; }
    .s { font-size: 12px; fill: #52514e; }
    .m { font-size: 12px; fill: #898781; }
    .cap { font-size: 13px; fill: #52514e; font-style: italic; }
  </style>
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#52514e"/>
    </marker>
  </defs>
  <rect width="920" height="350" fill="#fcfcfb"/>

  <!-- panel A: single call -->
  <rect x="14" y="16" width="284" height="314" rx="10" fill="#ffffff" stroke="#e1e0d9"/>
  <text x="156" y="44" text-anchor="middle" class="h">1 · Single call</text>
  <rect x="56" y="64" width="200" height="38" rx="8" fill="#eef1f5" stroke="#64748b"/>
  <text x="156" y="88" text-anchor="middle" class="t">prompt</text>
  <line x1="156" y1="102" x2="156" y2="121" stroke="#52514e" stroke-width="1.5" marker-end="url(#arr)"/>
  <rect x="56" y="124" width="200" height="54" rx="8" fill="#e6eff7" stroke="#0056a7"/>
  <text x="156" y="146" text-anchor="middle" class="t">LLM</text>
  <text x="156" y="164" text-anchor="middle" class="s">one forward pass</text>
  <line x1="156" y1="178" x2="156" y2="197" stroke="#52514e" stroke-width="1.5" marker-end="url(#arr)"/>
  <rect x="56" y="200" width="200" height="38" rx="8" fill="#eef1f5" stroke="#64748b"/>
  <text x="156" y="224" text-anchor="middle" class="t">answer</text>
  <text x="156" y="272" text-anchor="middle" class="cap">no memory, no actions,</text>
  <text x="156" y="290" text-anchor="middle" class="cap">no fresh facts</text>

  <!-- panel B: chain of thought -->
  <rect x="318" y="16" width="284" height="314" rx="10" fill="#ffffff" stroke="#e1e0d9"/>
  <text x="460" y="44" text-anchor="middle" class="h">2 · + Chain-of-Thought</text>
  <rect x="360" y="64" width="200" height="38" rx="8" fill="#eef1f5" stroke="#64748b"/>
  <text x="460" y="88" text-anchor="middle" class="t">prompt</text>
  <line x1="460" y1="102" x2="460" y2="121" stroke="#52514e" stroke-width="1.5" marker-end="url(#arr)"/>
  <rect x="360" y="124" width="200" height="78" rx="8" fill="#e6eff7" stroke="#0056a7"/>
  <text x="460" y="146" text-anchor="middle" class="t">LLM</text>
  <rect x="376" y="158" width="168" height="28" rx="6" fill="none" stroke="#0056a7" stroke-dasharray="4 3"/>
  <text x="460" y="176" text-anchor="middle" class="s">reasoning, step by step</text>
  <line x1="460" y1="202" x2="460" y2="221" stroke="#52514e" stroke-width="1.5" marker-end="url(#arr)"/>
  <rect x="360" y="224" width="200" height="38" rx="8" fill="#eef1f5" stroke="#64748b"/>
  <text x="460" y="248" text-anchor="middle" class="t">answer</text>
  <text x="460" y="290" text-anchor="middle" class="cap">reasons better - still can't act or verify</text>

  <!-- panel C: agent loop -->
  <rect x="622" y="16" width="284" height="314" rx="10" fill="#ffffff" stroke="#e1e0d9"/>
  <text x="764" y="44" text-anchor="middle" class="h">3 · Agent: the ReAct loop</text>
  <rect x="672" y="64" width="128" height="38" rx="8" fill="#e6eff7" stroke="#0056a7"/>
  <text x="736" y="88" text-anchor="middle" class="t">think</text>
  <line x1="736" y1="102" x2="736" y2="121" stroke="#52514e" stroke-width="1.5" marker-end="url(#arr)"/>
  <rect x="672" y="124" width="128" height="48" rx="8" fill="#e3f6ee" stroke="#1baf7a"/>
  <text x="736" y="144" text-anchor="middle" class="t">act</text>
  <text x="736" y="161" text-anchor="middle" class="s">call a tool</text>
  <line x1="736" y1="172" x2="736" y2="191" stroke="#52514e" stroke-width="1.5" marker-end="url(#arr)"/>
  <rect x="672" y="194" width="128" height="48" rx="8" fill="#f0efec" stroke="#52514e"/>
  <text x="736" y="214" text-anchor="middle" class="t">observe</text>
  <text x="736" y="231" text-anchor="middle" class="s">tool result</text>
  <path d="M672,218 L648,218 L648,83 L668,83" fill="none" stroke="#52514e" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="640" y="155" text-anchor="middle" class="m" transform="rotate(-90 640 155)">loop</text>
  <line x1="800" y1="83" x2="810" y2="83" stroke="#52514e" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="853" y="58" text-anchor="middle" class="m">done</text>
  <rect x="814" y="64" width="78" height="38" rx="8" fill="#eef1f5" stroke="#64748b"/>
  <text x="853" y="88" text-anchor="middle" class="t">answer</text>
  <text x="764" y="272" text-anchor="middle" class="cap">decides, acts, observes -</text>
  <text x="764" y="290" text-anchor="middle" class="cap">loops until it can answer</text>
</svg>
