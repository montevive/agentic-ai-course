<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 290" role="img">
  <title>The validate-retry loop behind structured output: the model proposes JSON, Pydantic validates it, failures go back to the model until a validated object comes out</title>
  <style>
    text { font-family: system-ui, -apple-system, "Segoe UI", sans-serif; fill: #0b0b0b; }
    .t { font-size: 13.5px; font-weight: 600; }
    .s { font-size: 12px; fill: #52514e; }
    .code { font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; font-size: 12px; fill: #0b0b0b; }
    .cap { font-size: 13px; fill: #52514e; font-style: italic; }
    .pass { font-size: 12px; font-weight: 700; fill: #0ca30c; }
    .fail { font-size: 12px; font-weight: 700; fill: #e34948; }
    .m { font-size: 12px; fill: #898781; }
  </style>
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#52514e"/>
    </marker>
    <marker id="arrg" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#0ca30c"/>
    </marker>
    <marker id="arrr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#e34948"/>
    </marker>
  </defs>
  <rect width="920" height="290" fill="#fcfcfb"/>

  <!-- LLM -->
  <rect x="60" y="96" width="180" height="64" rx="8" fill="#e6eff7" stroke="#0056a7"/>
  <text x="150" y="122" text-anchor="middle" class="t">LLM</text>
  <text x="150" y="142" text-anchor="middle" class="s">proposes JSON output</text>

  <text x="280" y="118" text-anchor="middle" class="m">raw output</text>
  <line x1="240" y1="128" x2="314" y2="128" stroke="#52514e" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- validation -->
  <rect x="320" y="96" width="220" height="64" rx="8" fill="#f0efec" stroke="#52514e"/>
  <text x="430" y="122" text-anchor="middle" class="t">Pydantic validation</text>
  <text x="430" y="142" text-anchor="middle" class="s">schema + output validators</text>

  <text x="590" y="118" text-anchor="middle" class="pass">pass</text>
  <line x1="540" y1="128" x2="634" y2="128" stroke="#0ca30c" stroke-width="1.8" marker-end="url(#arrg)"/>

  <!-- validated object -->
  <rect x="640" y="96" width="220" height="64" rx="8" fill="#e7f5e7" stroke="#0ca30c"/>
  <text x="750" y="122" text-anchor="middle" class="t">validated object</text>
  <text x="750" y="142" text-anchor="middle" class="code">ResearchAnswer</text>

  <!-- fail path -->
  <path d="M430,160 L430,208 L150,208 L150,166" fill="none" stroke="#e34948" stroke-width="1.8" marker-end="url(#arrr)"/>
  <text x="444" y="188" class="fail">fail</text>
  <text x="290" y="230" text-anchor="middle" class="cap">ModelRetry: the error message goes back to the model, which corrects itself</text>

  <text x="460" y="266" text-anchor="middle" class="cap">Retries are bounded (retries=2): failing repeatedly raises an exception, never a silent wrong answer.</text>
</svg>
