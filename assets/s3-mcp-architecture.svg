<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 330" role="img">
  <title>MCP architecture: any agent speaks one protocol (stdio or HTTP) to servers that expose tools, resources and prompts</title>
  <style>
    text { font-family: system-ui, -apple-system, "Segoe UI", sans-serif; fill: #0b0b0b; }
    .t { font-size: 13.5px; font-weight: 600; }
    .s { font-size: 12px; fill: #52514e; }
    .m { font-size: 12px; fill: #898781; }
    .env { font-size: 13px; font-weight: 600; fill: #52514e; letter-spacing: 0.5px; }
    .cap { font-size: 13px; fill: #52514e; font-style: italic; }
  </style>
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#52514e"/>
    </marker>
  </defs>
  <rect width="920" height="330" fill="#fcfcfb"/>

  <!-- agent -->
  <rect x="60" y="95" width="200" height="120" rx="10" fill="#e6eff7" stroke="#0056a7" stroke-width="1.5"/>
  <text x="160" y="125" text-anchor="middle" class="t">AGENT</text>
  <text x="160" y="145" text-anchor="middle" class="s">any framework or app</text>
  <rect x="85" y="165" width="150" height="30" rx="6" fill="#ffffff" stroke="#0056a7" stroke-dasharray="4 3"/>
  <text x="160" y="184" text-anchor="middle" class="s">MCP client</text>

  <!-- transports -->
  <line x1="264" y1="155" x2="426" y2="155" stroke="#52514e" stroke-width="1.5" marker-start="url(#arr)" marker-end="url(#arr)"/>
  <text x="345" y="138" text-anchor="middle" class="m">stdio · local subprocess</text>
  <text x="345" y="176" text-anchor="middle" class="m">HTTP · shared server</text>

  <!-- server -->
  <rect x="430" y="72" width="210" height="176" rx="10" fill="#ffffff" stroke="#1baf7a" stroke-width="1.5"/>
  <text x="535" y="100" text-anchor="middle" class="t">MCP SERVER</text>
  <rect x="450" y="114" width="170" height="32" rx="6" fill="#e3f6ee" stroke="#1baf7a"/>
  <text x="535" y="134" text-anchor="middle" class="s">tools · actions</text>
  <rect x="450" y="156" width="170" height="32" rx="6" fill="#eef1f5" stroke="#64748b"/>
  <text x="535" y="176" text-anchor="middle" class="s">resources · read-only data</text>
  <rect x="450" y="198" width="170" height="32" rx="6" fill="#e6eff7" stroke="#0056a7"/>
  <text x="535" y="218" text-anchor="middle" class="s">prompts · templates</text>

  <!-- existing servers -->
  <rect x="686" y="72" width="196" height="176" rx="10" fill="none" stroke="#898781" stroke-dasharray="6 4"/>
  <text x="784" y="100" text-anchor="middle" class="env">ALREADY WRITTEN</text>
  <text x="784" y="128" text-anchor="middle" class="s">filesystem · github</text>
  <text x="784" y="148" text-anchor="middle" class="s">postgres · sqlite</text>
  <text x="784" y="168" text-anchor="middle" class="s">gdrive · arxiv · pubmed</text>
  <text x="784" y="196" text-anchor="middle" class="m">one integration,</text>
  <text x="784" y="212" text-anchor="middle" class="m">every compliant agent</text>

  <text x="460" y="298" text-anchor="middle" class="cap">One protocol between agents and the world: servers expose capabilities, clients discover and call them.</text>
</svg>
