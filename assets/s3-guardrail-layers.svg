<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 360" role="img">
  <title>Defense in depth for production agents: input hygiene, runtime limits with human approval, output validation, and observability underneath</title>
  <style>
    text { font-family: system-ui, -apple-system, "Segoe UI", sans-serif; fill: #0b0b0b; }
    .t { font-size: 13.5px; font-weight: 600; }
    .s { font-size: 12px; fill: #52514e; }
    .m { font-size: 12px; fill: #898781; }
    .thr { font-size: 12.5px; font-weight: 700; fill: #e34948; }
    .cap { font-size: 13px; fill: #52514e; font-style: italic; }
  </style>
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#52514e"/>
    </marker>
    <marker id="arrr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#e34948"/>
    </marker>
    <marker id="arrb" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#64748b"/>
    </marker>
  </defs>
  <rect width="920" height="360" fill="#fcfcfb"/>

  <!-- threat -->
  <text x="250" y="46" text-anchor="middle" class="thr">prompt injection</text>
  <line x1="250" y1="56" x2="250" y2="100" stroke="#e34948" stroke-width="1.6" stroke-dasharray="5 3" marker-end="url(#arrr)"/>

  <!-- flow -->
  <rect x="30" y="120" width="100" height="50" rx="8" fill="#eef1f5" stroke="#64748b"/>
  <text x="80" y="142" text-anchor="middle" class="t">input</text>
  <text x="80" y="160" text-anchor="middle" class="s">user + docs</text>
  <line x1="130" y1="145" x2="166" y2="145" stroke="#52514e" stroke-width="1.5" marker-end="url(#arr)"/>

  <rect x="170" y="105" width="160" height="80" rx="8" fill="#f0efec" stroke="#52514e"/>
  <text x="250" y="128" text-anchor="middle" class="t">1 · input hygiene</text>
  <text x="250" y="148" text-anchor="middle" class="s">delimit data vs instructions</text>
  <text x="250" y="166" text-anchor="middle" class="s">least-privilege tools</text>
  <line x1="330" y1="145" x2="366" y2="145" stroke="#52514e" stroke-width="1.5" marker-end="url(#arr)"/>

  <rect x="370" y="105" width="180" height="80" rx="8" fill="#f0efec" stroke="#52514e"/>
  <text x="460" y="128" text-anchor="middle" class="t">2 · runtime belts</text>
  <text x="460" y="148" text-anchor="middle" class="s">usage limits · timeouts</text>
  <text x="460" y="166" text-anchor="middle" class="s">human approval (HITL)</text>
  <line x1="550" y1="145" x2="586" y2="145" stroke="#52514e" stroke-width="1.5" marker-end="url(#arr)"/>

  <rect x="590" y="105" width="170" height="80" rx="8" fill="#f0efec" stroke="#52514e"/>
  <text x="675" y="128" text-anchor="middle" class="t">3 · output validation</text>
  <text x="675" y="148" text-anchor="middle" class="s">schema + validators</text>
  <text x="675" y="166" text-anchor="middle" class="s">citations must exist</text>
  <line x1="760" y1="145" x2="796" y2="145" stroke="#64748b" stroke-width="1.8" marker-end="url(#arrb)"/>

  <rect x="800" y="120" width="90" height="50" rx="8" fill="#eef1f5" stroke="#64748b"/>
  <text x="845" y="150" text-anchor="middle" class="t">output</text>

  <!-- observability -->
  <rect x="170" y="235" width="590" height="60" rx="10" fill="none" stroke="#898781" stroke-dasharray="6 4"/>
  <text x="465" y="260" text-anchor="middle" class="t">4 · observability</text>
  <text x="465" y="280" text-anchor="middle" class="s">every prompt, tool call and result traced (Langfuse · LangSmith · Arize Phoenix)</text>

  <text x="460" y="336" text-anchor="middle" class="cap">Defense in depth: no single layer is enough; production agents stack all four.</text>
</svg>
