<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 460" role="img">
  <title>The tool-use contract: your harness sends the question and tool schemas, the model requests tool calls, your code executes them and returns results until the model answers</title>
  <style>
    text { font-family: system-ui, -apple-system, "Segoe UI", sans-serif; fill: #0b0b0b; }
    .t { font-size: 13.5px; font-weight: 600; }
    .s { font-size: 12px; fill: #52514e; }
    .m { font-size: 12px; fill: #898781; }
    .lbl { font-size: 12.5px; }
    .code { font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; font-size: 12px; fill: #0b0b0b; }
    .cap { font-size: 13px; fill: #52514e; font-style: italic; }
  </style>
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#52514e"/>
    </marker>
  </defs>
  <rect width="920" height="460" fill="#fcfcfb"/>

  <!-- lane headers -->
  <rect x="44" y="20" width="232" height="42" rx="8" fill="#f0efec" stroke="#52514e"/>
  <text x="160" y="38" text-anchor="middle" class="t">YOUR HARNESS</text>
  <text x="160" y="54" text-anchor="middle" class="s">your code: the loop</text>
  <rect x="344" y="20" width="232" height="42" rx="8" fill="#e6eff7" stroke="#0056a7"/>
  <text x="460" y="38" text-anchor="middle" class="t">MODEL API</text>
  <text x="460" y="54" text-anchor="middle" class="s">Claude / GPT / Gemini</text>
  <rect x="644" y="20" width="232" height="42" rx="8" fill="#e3f6ee" stroke="#1baf7a"/>
  <text x="760" y="38" text-anchor="middle" class="t">TOOLS</text>
  <text x="760" y="54" text-anchor="middle" class="s">local Python functions</text>

  <!-- lifelines -->
  <line x1="160" y1="62" x2="160" y2="400" stroke="#c3c2b7" stroke-dasharray="4 4"/>
  <line x1="460" y1="62" x2="460" y2="400" stroke="#c3c2b7" stroke-dasharray="4 4"/>
  <line x1="760" y1="62" x2="760" y2="400" stroke="#c3c2b7" stroke-dasharray="4 4"/>

  <!-- 1: question + tools -->
  <text x="310" y="102" text-anchor="middle" class="lbl">user question + tool definitions (JSON Schema)</text>
  <line x1="160" y1="110" x2="454" y2="110" stroke="#52514e" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- loop bracket -->
  <rect x="70" y="120" width="780" height="196" rx="8" fill="none" stroke="#c3c2b7" stroke-dasharray="6 4"/>
  <text x="838" y="138" text-anchor="end" class="m">repeat while the model keeps requesting tools</text>

  <!-- 2: tool_use -->
  <text x="310" y="140" text-anchor="middle" class="code">stop_reason = "tool_use"</text>
  <text x="310" y="154" text-anchor="middle" class="code">search_corpus({"query": "..."})</text>
  <line x1="460" y1="162" x2="166" y2="162" stroke="#52514e" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- 3: execute -->
  <text x="460" y="204" text-anchor="middle" class="code">output = search_corpus(**args)</text>
  <line x1="160" y1="212" x2="754" y2="212" stroke="#52514e" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- 4: return -->
  <text x="460" y="246" text-anchor="middle" class="lbl">return value (a string)</text>
  <line x1="760" y1="254" x2="166" y2="254" stroke="#52514e" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- 5: tool_result -->
  <text x="310" y="296" text-anchor="middle" class="code">{"type": "tool_result", "content": output}</text>
  <line x1="160" y1="304" x2="454" y2="304" stroke="#52514e" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- 6: final answer -->
  <text x="310" y="340" text-anchor="middle" class="lbl">final text answer</text>
  <text x="310" y="354" text-anchor="middle" class="code">stop_reason = "end_turn"</text>
  <line x1="460" y1="362" x2="166" y2="362" stroke="#52514e" stroke-width="1.5" marker-end="url(#arr)"/>

  <text x="460" y="424" text-anchor="middle" class="cap">The model decides which tool to call and with which arguments; your code executes it and returns the result.</text>
  <text x="460" y="442" text-anchor="middle" class="cap">All agent state lives in the messages list.</text>
</svg>
